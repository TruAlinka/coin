<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Game Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
        }

        .coin {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: fall linear forwards;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 50px;
            color: #333;
        }

        .coin:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 215, 0, 1);
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .question {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #333;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            font-size: 16px;
        }

        .option:hover {
            border-color: #4CAF50;
            background: #f0f8f0;
        }

        .option.correct {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        #score {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .feedback.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="score">💰 0</div>

    <div id="modal">
        <div class="modal-content">
            <div class="question" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What is the capital of France?",
                options: ["London", "Paris", "Berlin", "Madrid"],
                correct: 1
            },
            {
                question: "Choose the correct form: 'She ___ to school every day'",
                options: ["go", "goes", "going", "gone"],
                correct: 1
            },
            {
                question: "What does 'happy' mean?",
                options: ["sad", "angry", "joyful", "tired"],
                correct: 2
            },
            {
                question: "Complete: 'I ___ English for 5 years'",
                options: ["study", "am studying", "have studied", "studied"],
                correct: 2
            },
            {
                question: "What is the opposite of 'big'?",
                options: ["small", "large", "huge", "tall"],
                correct: 0
            }
        ];

        let score = 0;
        let currentQuestion = null;
        let answered = false;

        // Создание звуков через Web Audio API
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'click') {
                oscillator.frequency.value = 800;
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } else if (type === 'correct') {
                oscillator.frequency.setValueAtTime(523, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(659, audioContext.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            }
        }

        function getRandomQuestion() {
            return questions[Math.floor(Math.random() * questions.length)];
        }

        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '💰';
            
            const x = Math.random() * (window.innerWidth - 80);
            const duration = 6 + Math.random() * 3;
            
            coin.style.left = x + 'px';
            coin.style.top = '-100px';
            coin.style.animationDuration = duration + 's';
            
            coin.addEventListener('click', (e) => {
                e.stopPropagation();
                playSound('click');
                currentQuestion = getRandomQuestion();
                showModal();
                coin.remove();
            });
            
            document.getElementById('gameContainer').appendChild(coin);
            
            setTimeout(() => {
                if (coin.parentNode) coin.remove();
            }, duration * 1000);
        }

        function showModal() {
            answered = false;
            const modal = document.getElementById('modal');
            const questionText = document.getElementById('questionText');
            const optionsContainer = document.getElementById('optionsContainer');
            const feedback = document.getElementById('feedback');
            
            questionText.textContent = currentQuestion.question;
            optionsContainer.innerHTML = '';
            feedback.classList.remove('show');
            
            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = option;
                btn.addEventListener('click', () => checkAnswer(index, btn));
                optionsContainer.appendChild(btn);
            });
            
            modal.classList.add('active');
        }

        function checkAnswer(index, btn) {
            if (answered) return;
            answered = true;
            
            const feedback = document.getElementById('feedback');
            const options = document.querySelectorAll('.option');
            
            if (index === currentQuestion.correct) {
                score++;
                document.getElementById('score').textContent = '💰 ' + score;
                btn.classList.add('correct');
                feedback.textContent = '✅ Correct!';
                feedback.style.background = '#4CAF50';
                feedback.style.color = 'white';
                playSound('correct');
            } else {
                btn.classList.add('incorrect');
                options[currentQuestion.correct].classList.add('correct');
                feedback.textContent = '❌ Wrong! The correct answer is: ' + currentQuestion.options[currentQuestion.correct];
                feedback.style.background = '#f44336';
                feedback.style.color = 'white';
            }
            
            feedback.classList.add('show');
            
            setTimeout(() => {
                document.getElementById('modal').classList.remove('active');
            }, 2000);
        }

        // Spawn coins каждые 3 секунды
        setInterval(createCoin, 3000);
        
        // Initial coin
        createCoin();
    </script>
</body>
</html>
