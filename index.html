<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Падающие монетки с заданиями</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
      position: relative;
    }

    #score {
      position: fixed;
      top: 15px; right: 20px;
      font-size: 24px;
      font-weight: 700;
      color: gold;
      text-shadow: 0 0 5px #b58500;
      pointer-events: none;
      z-index: 50;
    }

    /* Контейнер для всех монеток */
    #coinsContainer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; /* Чтобы клики сначала обрабатывали дочерние монетки */
      z-index: 40;
    }

    /* Общий стиль монетки */
    .coin {
      position: absolute;
      width: 100px;
      height: 100px;
      background:
        radial-gradient(circle at 50% 50%, #fff8b8 40%, #d4af37 85%);
      border-radius: 50%;
      border: 4px solid #b7950b;
      box-shadow:
        inset 0 10px 15px rgba(255, 255, 255, 0.7),
        inset 0 -10px 25px rgba(180, 140, 25, 0.9),
        0 0 20px rgba(212, 175, 55, 0.8);
      filter: drop-shadow(0 0 8px #ffd700);
      cursor: pointer;
      user-select: none;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      transform-origin: center;
      pointer-events: auto; /* чтобы клики по этим элементам обрабатывались */
      will-change: transform, top, left;
      z-index: 40;
      animation-name: fall, spin;
      animation-duration: 8s, 3s;
      animation-iteration-count: 1, infinite;
      animation-timing-function: linear, linear;
    }

    /* Плавное падение монетки */
    @keyframes fall {
      0% {
        top: -120px;
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        top: 100vh;
        opacity: 0;
      }
    }

    /* Вращение монетки */
    @keyframes spin {
      from {
        transform: translateX(-50%) rotate(0deg);
      }
      to {
        transform: translateX(-50%) rotate(360deg);
      }
    }

    /* Модальное окно */
    #questionModal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      background: rgba(32, 35, 42, 0.95);
      border: 3px solid gold;
      border-radius: 16px;
      padding: 25px 30px;
      box-shadow: 0 0 20px gold;
      color: white;
      display: none;
      z-index: 100;
    }

    #questionModal h2 {
      margin: 0 0 15px 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .answer-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      background: #444851;
      color: white;
      font-size: 17px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
    }

    .answer-btn:hover {
      background-color: gold;
      color: black;
    }

    #closeBtn {
      margin-top: 12px;
      background: transparent;
      border: none;
      color: lightgray;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
      display:block;
      text-align:center;
    }

    #closeBtn:hover {
      color: gold;
    }
  </style>
</head>
<body>

  <div id="score">Монеток: 0</div>
  <div id="coinsContainer"></div>

  <div id="questionModal" role="dialog" aria-modal="true" aria-labelledby="questionText">
    <h2 id="questionText">Вопрос</h2>
    <div id="answers"></div>
    <button id="closeBtn">Закрыть</button>
  </div>

  <!-- Звуки -->
  <audio id="soundClick" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" preload="auto"></audio>
  <audio id="soundCorrect" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

  <script>
    (function() {
      const coinsContainer = document.getElementById('coinsContainer');
      const scoreElem = document.getElementById('score');
      const modal = document.getElementById('questionModal');
      const questionText = document.getElementById('questionText');
      const answersDiv = document.getElementById('answers');
      const closeBtn = document.getElementById('closeBtn');

      const soundClick = document.getElementById('soundClick');
      const soundCorrect = document.getElementById('soundCorrect');

      let score = 0;
      let questions = [];
      let activeCoinId = null; // id монетки, по которой открыт вопрос

      // Кол-во монеток одновременно
      const COIN_COUNT = 3;

      // Объект для хранения состояния каждой монетки (занята/свободна)
      const coinsState = {};

      // Загружаем задания из внешнего JSON-файла
      async function loadQuestions() {
        try {
          const response = await fetch('questions.json'); // Файл должен быть рядом с этим HTML или по URL
          if (!response.ok) throw new Error('Ошибка загрузки заданий');
          questions = await response.json();
        } catch (e) {
          alert('Не удалось загрузить задания. Проверьте файл questions.json и путь к нему.\n' + e.message);
        }
      }

      // Создаём монетку с уникальным id
      function createCoin(id) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.dataset.id = id;

        // Назначим случайное горизонтальное положение при старте (10%-90%)
        const leftPercent = 10 + Math.random() * 80;
        coin.style.left = `${leftPercent}%`;
        coin.style.top = '-120px';
        coin.style.animationName = 'fall, spin';
        coin.style.animationDuration = '8s, 3s';
        coin.style.animationIterationCount = '1, infinite';
        coin.style.animationTimingFunction = 'linear, linear';
        coin.style.transform = 'translateX(-50%) rotate(0deg)';

        coin.addEventListener('animationend', () => {
          if (!coinsState[id].caught && activeCoinId !== id) {
            resetCoin(id);
          }
        });

        coin.addEventListener('click', e => {
          e.stopPropagation();
          if (activeCoinId !== null) return; // уже открыт вопрос

          soundClick.play();

          activeCoinId = id;
          coinsState[id].caught = true; // чтобы остановить сброс на конце анимации
          showQuestionForCoin(id);
        });

        coinsContainer.appendChild(coin);
        coinsState[id] = { element: coin, caught: false };
      }

      // Сбросить монетку — новая позиция и запустить анимацию заново
      function resetCoin(id) {
        const coin = coinsState[id].element;
        coinsState[id].caught = false;
        // Новое положение
        const leftPercent = 10 + Math.random() * 80;
        coin.style.left = `${leftPercent}%`;
        coin.style.top = '-120px';

        // Сбрасываем анимацию
        coin.style.animation = 'none';
        coin.offsetHeight; // ребоот анимации
        coin.style.animationName = 'fall, spin';
        coin.style.animationDuration = '8s, 3s';
        coin.style.animationIterationCount = '1, infinite';
        coin.style.animationTimingFunction = 'linear, linear';
        coin.style.opacity = '1';
      }

      // Показать случайный вопрос для монетки
      function showQuestionForCoin(id) {
        if (!questions.length) {
          alert('Задания не загружены.');
          activeCoinId = null;
          resetCoin(id);
          return;
        }

        const q = questions[Math.floor(Math.random() * questions.length)];
        currentQuestion = q;
        currentQuestionCoinId = id;

        questionText.textContent = q.question;
        answersDiv.innerHTML = '';
        q.answers.forEach((text, i) => {
          const btn = document.createElement('button');
          btn.textContent = text;
          btn.className = 'answer-btn';
          btn.onclick = () => {
            if (i === q.correct) {
              soundCorrect.play();
              alert('Правильно! Вы получили монетку.');
              score++;
              scoreElem.textContent = `Монеток: ${score}`;
              modal.style.display = 'none';
              activeCoinId = null;
              resetCoin(id);
            } else {
              alert('Неправильно, попробуйте ещё.');
            }
          };
          answersDiv.appendChild(btn);
        });
        modal.style.display = 'block';
      }

      closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
        if (activeCoinId !== null) {
          resetCoin(activeCoinId);
          activeCoinId = null;
        }
      });

      // Инициализация — создаём монетки и загружаем задания
      async function init() {
        await loadQuestions();
        for (let i = 0; i < COIN_COUNT; i++) {
          createCoin(i);
        }
      }

      init();

    })();
  </script>

</body>
</html>
